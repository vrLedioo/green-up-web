name: CI — Security & Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read        # Minimum required; no write access granted
  security-events: write # Needed if you enable CodeQL later

jobs:
  # ─── 1. Dependency Vulnerability Scan (OWASP A06) ─────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fail CI if any HIGH or CRITICAL vulnerability is found
      # Use --audit-level=moderate to be stricter if desired
      - name: npm audit (high+)
        run: npm audit --audit-level=high

  # ─── 2. Type-Check (static analysis catches injection-class bugs) ──────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint:types

  # ─── 3. Production Build Gate ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [audit, typecheck]    # Only build if security checks pass
    env:
      # Provide a safe dummy value so the build doesn't fail on missing env var
      FORMSPREE_ID: ci_placeholder
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ─── 4. Secret Scanning (OWASP A02 / Supply Chain) ───────────────────────
  # Detects accidentally committed API keys, tokens, passwords.
  # Requires GitHub Advanced Security (free for public repos).
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Full history needed for Gitleaks

      - name: Gitleaks — scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
